<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>
    <style>
        body { text-align: center; padding: 100px 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9fafb; color: #1f2937; }
        h1 { font-size: 36px; color: #f59e0b; margin-bottom: 20px; }
        p { font-size: 18px; line-height: 1.6; color: #4b5563; }
        article { display: block; text-align: left; max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .notice { color: #ef4444; font-weight: bold; font-size: 20px; margin-top: 25px; padding: 15px; border: 1px dashed #fca5a5; border-radius: 8px; background: #fef2f2; text-align: center; }
    </style>
</head>
<body>
<article>
    <h1>System Under Maintenance</h1>
    <div>
        <p>Dear users, our system is currently undergoing scheduled maintenance and network upgrades to improve our services.</p>
        <p>We apologize for any inconvenience caused and appreciate your patience.</p>
        <div class="notice">
            👉 Please bookmark our new official website:<br>
            <strong>:https://www.twinasseting.xyz</strong>
        </div>
    </div>
</article>
</body>
</html>
